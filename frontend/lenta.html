<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YMY — Лента</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <header>
            <a href="index.html"><img src="images/5.png" alt="YMY Logo"></a>
            <div class="auth-buttons">
                <button class="my-button" onclick="logout()">Выйти</button>
            </div>
        </header>
    </main>
    <script>
        if (!localStorage.getItem("token")) {
            window.location.href = "login.html";
        }
        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
